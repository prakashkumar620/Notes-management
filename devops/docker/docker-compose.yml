# Docker Compose configuration for Notes Management System
# Before running, set your Google OAuth credentials:
# export GOOGLE_CLIENT_ID="your_client_id"
# export GOOGLE_CLIENT_SECRET="your_client_secret"
# Then run: docker-compose up -d

services:
  mongodb:
    image: mongo:latest
    container_name: notes-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: notes-management
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - notes-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../../
      dockerfile: devops/docker/Dockerfile.backend
    container_name: notes-backend
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/notes-management?authSource=admin
      JWT_SECRET: ac700e8071cba6c7fc809ed908a62739b70af6b89d357c11007fe8c1c794b8bb
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      NODE_ENV: production
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./../../backend/uploads:/app/uploads
    networks:
      - notes-network

  frontend:
    build:
      context: ../../
      dockerfile: devops/docker/Dockerfile.frontend
    container_name: notes-frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      REACT_APP_API_BASE_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - notes-network

volumes:
  mongodb_data:
    driver: local

networks:
  notes-network:
    driver: bridge
