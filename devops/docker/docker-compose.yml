# Docker Compose configuration for Prakash Study Stack
# Before running, set your Google OAuth credentials:
# export GOOGLE_CLIENT_ID="your_client_id"
# export GOOGLE_CLIENT_SECRET="your_client_secret"
# Then run: docker-compose up -d

services:
  mongodb:
    image: mongo:latest
    container_name: notes-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: notes-management
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - notes-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ../../
      dockerfile: devops/docker/Dockerfile.backend
    container_name: notes-backend
    env_file:
      - ./../../backend/.env
    environment:
      MONGODB_URI: mongodb://admin:password@mongodb:27017/notes-management?authSource=admin
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./../../backend/uploads:/app/uploads
    networks:
      - notes-network

  frontend:
    build:
      context: ../../
      dockerfile: devops/docker/Dockerfile.frontend
    container_name: notes-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - notes-network

volumes:
  mongodb_data:
    driver: local

networks:
  notes-network:
    driver: bridge
