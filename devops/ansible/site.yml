---
- name: Setup Prakash Study Stack Infrastructure
  hosts: all
  become: yes
  gather_facts: yes
  
  vars:
    app_name: "prakash-study-stack"
    docker_network: "notes-network"
    
  tasks:
    # Update system
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    
    # Install Docker
    - name: Install Docker dependencies
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg
        - lsb-release
    
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
    
    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
    
    - name: Install Docker
      apt:
        name: "{{ item }}"
        state: latest
      loop:
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-compose-plugin
    
    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes
    
    # Install Node.js
    - name: Install Node.js
      apt:
        name: "{{ item }}"
        state: present
      loop:
        - nodejs
        - npm
    
    # Install Git
    - name: Install Git
      apt:
        name: git
        state: present
    
    # Create application directory
    - name: Create app directory
      file:
        path: "/opt/{{ app_name }}"
        state: directory
        mode: '0755'
    
    # Create Docker network
    - name: Create Docker network
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present
    
    # Create MongoDB
    - name: Pull MongoDB image
      community.docker.docker_image:
        name: mongo
        tag: latest
        source: pull
    
    - name: Create MongoDB volume
      community.docker.docker_volume:
        name: mongodb_data
        state: present
    
    - name: Run MongoDB container
      community.docker.docker_container:
        name: "{{ app_name }}-mongodb"
        image: mongo:latest
        state: started
        restart_policy: always
        env:
          MONGO_INITDB_ROOT_USERNAME: "admin"
          MONGO_INITDB_ROOT_PASSWORD: "password"
        volumes:
          - mongodb_data:/data/db
        ports:
          - "27017:27017"
        networks:
          - name: "{{ docker_network }}"
    
    - name: Wait for MongoDB to start
      pause:
        seconds: 10
    
    # Install DevOps tools
    - name: Install curl
      apt:
        name: curl
        state: present
    
    - name: Install wget
      apt:
        name: wget
        state: present
    
    # Display installation summary
    - name: Display installation summary
      debug:
        msg:
          - "==========================================="
          - "Installation Summary"
          - "==========================================="
          - "✓ Docker: {{ ansible_date_time.iso8601 }}"
          - "✓ Node.js: {{ ansible_date_time.iso8601 }}"
          - "✓ MongoDB: running on port 27017"
          - "==========================================="
