global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'notes-management-system'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:5000']
        labels:
          service: 'backend'

  - job_name: 'mongodb'
    static_configs:
      - targets: ['localhost:27017']
        labels:
          service: 'database'

  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
        labels:
          service: 'docker'

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: 'system'
